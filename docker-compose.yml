# Postgres in docker

services:
  db:
    image: postgres:15-alpine
    container_name: business_db_cont
    environment:
      # Docker loads variables from .env automatically
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Bridge for DB
    # Container is healthy if command returns 0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]   # CMD-SHELL needs one argument after itself
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: my-redis
    ports:
    - "6379:6379"

  app:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    env_file:
      - .env
    # Creating root in container
    volumes:
      - .:/app
    # Line for automatic alembic base creation and hot reload
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_gui
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@test.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redis_gui
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_started

# Managed volume to persist data after 'docker-compose down'
volumes:
  postgres_data: