# Postgres in docker

services:
  db:
    image: postgres:15-alpine
    container_name: business_db_cont
    environment:
      # Docker loads variables from .env automatically
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"